<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="purple">
<head>

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        tailwind.config = {

    <style>
        :root { --primary: #8b5cf6; --secondary: #6d28d9; --bg: #f9fafb; }
        [data-theme="red"] { --primary: #9f1239; --secondary: #881337; }
        [data-theme="orange"] { --primary: #ea580c; --secondary: #c2410c; }
        [data-theme="gold"] { --primary: #d97706; --secondary: #b45309; }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); overflow-x: hidden; scroll-behavior: smooth; }
        [lang="fr"] body { font-family: 'Poppins', sans-serif; }
        
        /* Utility Classes */
        .hidden-all { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        /* Floating Elements */
        .fab { position: fixed; bottom: 20px; z-index: 50; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.3s, background 0.3s; }
        .fab:hover { transform: scale(1.1); }
        .fab-whatsapp { right: 20px; background-color: #25D366; color: white; font-size: 30px; }
        .fab-sewing { right: 90px; background-color: var(--primary); color: white; font-size: 25px; }
        [dir="ltr"] .fab-whatsapp { left: 20px; right: auto; }
        [dir="ltr"] .fab-sewing { left: 90px; right: auto; }

        /* Toast */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #10B981; color: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 9999; font-weight: bold; transition: top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; align-items: center; gap: 10px; }
        .toast-show { top: 20px !important; }

        /* Print Media for Invoices */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="text-gray-800">

                pixel: '',

                about_ar: 'نحن ورشة روجينا للخياطة العصرية...',

                { id: 'p2', name_ar: 'طقم أطفال ولادي', name_fr: 'Ensemble Garçon', desc_ar: 'قطن 100%', desc_fr: '100% Coton', price: 3200, oldPrice: 4000, category: 'c2', images: ['https://images.unsplash.com/photo-1519241047957-be31d7379a5d?w=600'], sizes: ['2Y','4Y'], colors: ['أزرق'], stock: 5, featured: true, reviews: [] }

        // Initialize Local DB

        function saveData() { localStorage.setItem('ROUJINA_DB', JSON.stringify(DB)); }

        // --- Firebase Placeholder Wrapper (Ready for SDK substitution) ---
        const fbWrap = {
            async add(col, data) { data.id = Date.now().toString(); DB[col].push(data); saveData(); return data; },
            async update(col, id, data) { let idx = DB[col].findIndex(x => x.id == id); if(idx>-1) DB[col][idx] = {...DB[col][idx], ...data}; saveData(); },
            async remove(col, id) { DB[col] = DB[col].filter(x => x.id != id); saveData(); }
        };

        /* ==========================================================================
           2. UTILITIES & TRANSLATIONS
           ========================================================================== */
        
        const _u = "YWRtaW4="; // admin
        const _p = "I2FtaXJhMjAyNiM="; // #amira2026#

        };

        function trans(key) { return T[DB.lang][key] || key; }
        function getLangObj(obj, key) { return DB.lang === 'ar' ? obj[`${key}_ar`] : obj[`${key}_fr`]; }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.add('toast-show');
            setTimeout(() => toast.classList.remove('toast-show'), 3500);
        }

        function applySettings() {
            document.documentElement.setAttribute('data-theme', DB.settings.theme);
            document.documentElement.lang = DB.lang;
            document.documentElement.dir = DB.lang === 'ar' ? 'rtl' : 'ltr';
            if(DB.settings.theme.startsWith('#')) {
                document.documentElement.style.setProperty('--primary', DB.settings.theme);
                document.documentElement.style.setProperty('--secondary', DB.settings.theme); // simplify custom
            }
        }

        // Image Compressor (Canvas API)
        function compressImage(file, callback) {
            if (!file || !file.type.match(/image.*/)) return;
            if (file.size < 1.5 * 1024 * 1024) {
                const reader = new FileReader();
                reader.onload = e => callback(e.target.result);
                reader.readAsDataURL(file);
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX = 1000;
                    let w = img.width, h = img.height;
                    if (w > h && w > MAX) { h *= MAX / w; w = MAX; }
                    else if (h > MAX) { w *= MAX / h; h = MAX; }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    callback(canvas.toDataURL('image/jpeg', 0.7)); // Base64
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        /* ==========================================================================
           3. ROUTING & RENDERING ENGINE
           ========================================================================== */
        
        function navigate(hash) { window.location.hash = hash; }

        window.addEventListener('hashchange', router);
        window.addEventListener('DOMContentLoaded', () => { applySettings(); router(); });

        function router() {
            const hash = window.location.hash.replace('#', '') || 'home';
            const root = document.getElementById('app-root');
            root.innerHTML = ''; // Clear DOM
            window.scrollTo(0,0);

            if (hash === 'admin09') renderAdminLogin(root);
            else if (hash === 'admin-dash' && sessionStorage.getItem('adminAuth')) renderAdminDashboard(root);
            else if (hash === 'sewing') renderClientLayout(root, renderSewingPage());
            else if (hash.startsWith('product/')) renderClientLayout(root, renderProductPage(hash.split('/')[1]));
            else renderClientLayout(root, renderHomePage());
        }

        /* ==========================================================================
           4. CLIENT UI COMPONENTS
           ========================================================================== */

                </header>

                <!-- Sidebar -->
                <div id="sidebar" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden-all" onclick="this.classList.add('hidden-all')">

        function renderHomePage() {

        // Action Functions
        function toggleLang() { DB.lang = DB.lang === 'ar' ? 'fr' : 'ar'; saveData(); applySettings(); router(); }
        function searchProducts(q) {
            const grid = document.getElementById('products-grid');
            if(!grid) return;
            grid.innerHTML = DB.products.filter(p => p.name_ar.includes(q) || p.name_fr.includes(q)).map(p => `...`).join(''); // Minified for logic
            router(); // Simple re-render logic for brevity
        }

        function calcTotal(price) {
            const w = document.getElementById('ord_wilaya').value;
            const shipping = w ? (DB.shippingRates[w] || 0) : 0;
            document.getElementById('display_total').innerText = (price + shipping) + ' دج';
        }

        async function submitProductOrder(e, pId, price) {
            e.preventDefault();
            const w = document.getElementById('ord_wilaya').value;
            const shipping = DB.shippingRates[w] || 0;
            const order = {
                type: 'product', productId: pId, date: new Date().toLocaleString(),
                size: document.getElementById('ord_size')?.value || '',
                color: document.getElementById('ord_color')?.value || '',
                name: document.getElementById('ord_name').value,
                phone: document.getElementById('ord_phone').value,
                wilaya: w, address: document.getElementById('ord_address').value,
                delivery: document.getElementById('ord_type').value,
                total: price + shipping, status: 'pending'
            };
            await fbWrap.add('orders', order);
            
            // Decrease Stock
            let p = DB.products.find(x=>x.id==pId);
            if(p) p.stock--;
            saveData();

            showToast('تم تأكيد طلبك بنجاح! سنتصل بك قريباً.');
            setTimeout(() => navigate('home'), 2000);
        }

        async function submitSewing(e) {
            e.preventDefault();
            const file = document.getElementById('sew_img').files[0];
            compressImage(file, async (base64Img) => {
                const order = {
                    date: new Date().toLocaleString(), img: base64Img, status: 'pending',
                    desc: document.getElementById('sew_desc').value,
                    name: document.getElementById('sew_name').value,
                    phone: document.getElementById('sew_phone').value,
                    wilaya: document.getElementById('sew_wilaya').value
                };
                await fbWrap.add('sewingOrders', order);
                showToast('تم استلام طلب الخياطة، سيتم التواصل معك لتأكيد السعر.');
                setTimeout(() => navigate('home'), 2000);
            });
        }

        // Admin Helpers
        function adminTab(tab) {
            document.querySelectorAll('.ad-tab').forEach(e => e.classList.add('hidden-all'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden-all');
            // Re-render dashboard dynamically if clicked to update numbers
            if(tab === 'dash' || tab === 'orders' || tab === 'erp') renderAdminDashboard(document.getElementById('app-root'));
            setTimeout(() => document.getElementById(`tab-${tab}`).classList.remove('hidden-all'), 10);
        }

        function changeTheme(color) {
            DB.settings.theme = color; saveData(); applySettings();
            showToast('تم تغيير لون الموقع بنجاح!');
        }

        function updateOrderStatus(id, status) {
            fbWrap.update('orders', id, { status });
            showToast('تم تحديث حالة الطلب');
        }

        function addFinance() {
            const amt = parseFloat(document.getElementById('fin_amount').value);
            if(!amt) return;
            fbWrap.add('finances', { type: document.getElementById('fin_type').value, amount: amt, desc: document.getElementById('fin_desc').value, date: new Date().toLocaleDateString() });
            adminTab('erp');
        }

        function handleCSV(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.split('\n');
                let newRates = {};
                lines.forEach(line => {
                    const parts = line.split(',');
                    if(parts.length >= 2) newRates[parts[0].trim()] = parseInt(parts[1].trim());
                });
                DB.shippingRates = newRates; saveData();
                showToast('تم تحديث أسعار الشحن من الملف بنجاح!');
            };
            reader.readAsText(file);
        }

            const order = DB.orders.find(o => o.id === id);
            const pr = document.getElementById('print-area');

        // Invoice Logic (Admin)
        function printInvoiceUI() {
            const el = document.getElementById('invoice-builder');

            if(window.html2pdf) {
