<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="purple">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROUJÎNA | روجينا</title>
    
    <!-- CSS Framework & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: 'var(--primary)', secondary: 'var(--secondary)' } } }
        }
    </script>

    <style>
        /* Themes Setup */
        :root { --primary: #8b5cf6; --secondary: #6d28d9; --bg: #f9fafb; }
        [data-theme="red"] { --primary: #9f1239; --secondary: #881337; }
        [data-theme="orange"] { --primary: #ea580c; --secondary: #c2410c; }
        [data-theme="gold"] { --primary: #d97706; --secondary: #b45309; }
        
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); overflow-x: hidden; scroll-behavior: smooth; }
        [lang="fr"] body { font-family: 'Poppins', sans-serif; }
        
        /* Utilities */
        .hidden-all { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        .slide-up { animation: slideUp 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Custom UI for Variants (Sizes & Colors) */
        .variant-selector input[type="radio"] { display: none; }
        .variant-selector div { border: 2px solid #e5e7eb; padding: 10px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; background: white; color: #374151; }
        .variant-selector input[type="radio"]:checked + div { border-color: var(--primary); background-color: var(--primary); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .variant-selector input[type="radio"]:checked + div.color-box { border: 4px solid #111; transform: scale(1.05); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        /* Floating Button (Sewing Only) */
        .fab-sewing { position: fixed; bottom: 30px; z-index: 50; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; background-color: var(--primary); color: white; font-size: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); cursor: pointer; transition: 0.3s; right: 30px; }
        [dir="ltr"] .fab-sewing { left: 30px; right: auto; }
        .fab-sewing:hover { transform: scale(1.1) rotate(15deg); }

        /* Modals & Toasts */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #111827; color: white; padding: 15px 30px; border-radius: 50px; z-index: 99999; font-weight: bold; transition: top 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55); display: flex; gap: 10px; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .toast-show { top: 30px !important; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(5px); }

        /* Print Mode */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; }
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Global Toast & Modals -->
    <div id="toast"><i class="fas fa-check-circle text-green-400 text-xl"></i> <span id="toast-msg"></span></div>
    <div id="modal-container"></div>
    <div id="print-area" class="hidden-all bg-white"></div>

    <!-- Main Application Container -->
    <div id="app-root" class="flex justify-center items-center h-screen bg-gray-50">
        <div class="text-center text-primary fade-in">
            <i class="fas fa-circle-notch fa-spin text-6xl mb-4"></i>
            <h2 class="text-2xl font-black">جاري تحميل النظام...</h2>
            <p class="text-gray-500 font-bold mt-2">الاتصال بـ Firebase</p>
        </div>
    </div>

    <!-- MAIN JAVASCRIPT (ES MODULE) -->
    <script type="module">
        /* ==========================================================================
           1. FIREBASE CONFIGURATION & INITIALIZATION
           ========================================================================== */
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD0yIvV9kyerbUi9udhjTdvdPckSTBluTk",
            authDomain: "cdestok-marketplace.firebaseapp.com",
            projectId: "cdestok-marketplace",
            storageBucket: "cdestok-marketplace.firebasestorage.app",
            messagingSenderId: "993053470339",
            appId: "1:993053470339:web:0765d60a66f97d827d75b6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Security Credentials
        const _U = "YWRtaW4="; // admin
        const _P = "I2FtaXJhMjAyNiM="; // #amira2026#

        /* ==========================================================================
           2. GLOBAL STATE & FIREBASE SYNC FUNCTIONS
           ========================================================================== */
        window.DB = { 
            lang: 'ar', 
            settings: { main: { theme: 'purple', logo: '', whatsapp: '', fb: '', ig: '', tt: '', pixel: '', mapUrl: 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d102434.61338662661!2d2.8091176211604165!3d36.48202573686866!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x128fa6b00676b0cb%3A0xe5a3bb4de278ce51!2sBlida!5e0!3m2!1sen!2sdz!4v1700000000000!5m2!1sen!2sdz', pol_priv: 'سياسة الخصوصية...', pol_ship: 'سياسة الشحن...', about: 'نحن ورشة روجينا...' } }, 
            shipping: {}, 
            categories: [], 
            products: [], 
            orders: [], 
            sewingOrders: [], 
            finances: [] 
        };

        window.FB = {
            save: async (col, id, data) => { await setDoc(doc(db, col, id), data); },
            update: async (col, id, data) => { await updateDoc(doc(db, col, id), data); },
            delete: async (col, id) => { await deleteDoc(doc(db, col, id)); }
        };

        async function fetchSystemData() {
            try {
                const cols = ['settings', 'shipping', 'categories', 'products', 'orders', 'sewingOrders', 'finances'];
                for (let c of cols) {
                    const snap = await getDocs(collection(db, c));
                    window.DB[c] = c === 'settings' || c === 'shipping' ? {} : [];
                    snap.forEach(d => {
                        if (c === 'settings' || c === 'shipping') window.DB[c][d.id] = d.data();
                        else window.DB[c].push({ id: d.id, ...d.data() });
                    });
                }
                
                // Ensure default settings exist in Firebase
                if(!window.DB.settings.main) {
                    await window.FB.save('settings', 'main', window.DB.settings.main);
                }

                // Inject Meta Pixel if exists
                if(window.DB.settings.main.pixel && !window.pixelInjected) {
                    console.log("Pixel Injected: " + window.DB.settings.main.pixel); // Mock injection
                    window.pixelInjected = true;
                }

                applyGlobalSettings();
                window.router();
            } catch (err) {
                console.error("Firebase Sync Error:", err);
                document.getElementById('app-root').innerHTML = `<div class="text-center p-20"><h2 class="text-3xl text-red-500 font-black">خطأ في الاتصال بقاعدة البيانات!</h2><p class="text-gray-600 mt-4 font-bold">يرجى التأكد من اتصالك بالإنترنت وإعدادات Firebase.</p></div>`;
            }
        }

        /* ==========================================================================
           3. UTILITIES & HELPERS
           ========================================================================== */
        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('toast-show'); setTimeout(() => t.classList.remove('toast-show'), 3500);
        };

        window.showModal = (title, content) => {
            document.getElementById('modal-container').innerHTML = `
                <div class="modal-overlay fade-in" onclick="this.innerHTML=''">
                    <div class="bg-white p-8 rounded-3xl w-11/12 md:w-1/2 max-h-[80vh] overflow-y-auto slide-up relative" onclick="event.stopPropagation()">
                        <button class="absolute top-4 ${window.DB.lang==='ar'?'left-4':'right-4'} text-red-500 text-3xl font-black" onclick="document.getElementById('modal-container').innerHTML=''">&times;</button>
                        <h2 class="text-3xl font-black text-primary mb-6">${title}</h2>
                        <div class="text-gray-700 font-bold leading-relaxed whitespace-pre-wrap">${content}</div>
                    </div>
                </div>`;
        };

        window.compressImage = (file, maxWidth, callback) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > maxWidth) { h *= maxWidth / w; w = maxWidth; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                }; img.src = e.target.result;
            }; reader.readAsDataURL(file);
        };

        function applyGlobalSettings() {
            const s = window.DB.settings.main;
            document.documentElement.setAttribute('data-theme', s.theme || 'purple');
            document.documentElement.lang = window.DB.lang;
            document.documentElement.dir = window.DB.lang === 'ar' ? 'rtl' : 'ltr';
            if(s.theme && s.theme.startsWith('#')) {
                document.documentElement.style.setProperty('--primary', s.theme);
                document.documentElement.style.setProperty('--secondary', s.theme);
            }
        }

        // Translation Dictionary
        const TR = {
            ar: { home: 'الرئيسية', sew: 'طلب خياطة وتفصيل', about: 'من نحن', priv: 'سياسة الخصوصية', ship: 'سياسة الشحن', search: 'ابحث عن منتج...', cart: 'عربة التسوق', size: 'المقاس', color: 'اللون', qty: 'الكمية', confirm: 'تأكيد الطلب', home_d: 'للمنزل', desk_d: 'للمكتب' },
            fr: { home: 'Accueil', sew: 'Sur Mesure (Couture)', about: 'À Propos', priv: 'Confidentialité', ship: 'Livraison', search: 'Rechercher...', cart: 'Panier', size: 'Taille', color: 'Couleur', qty: 'Quantité', confirm: 'Confirmer', home_d: 'À Domicile', desk_d: 'Au Bureau' }
        };
        window.t = (k) => TR[window.DB.lang][k] || k;
        window.l = (obj, key) => window.DB.lang === 'ar' ? (obj[`${key}_ar`] || obj['ar']) : (obj[`${key}_fr`] || obj['fr']);

        /* ==========================================================================
           4. ROUTING & TEMPLATE BUILDER
           ========================================================================== */
        window.navigate = (hash) => { window.location.hash = hash; };
        window.router = () => {
            const hash = window.location.hash.replace('#', '') || 'home';
            const root = document.getElementById('app-root');
            root.className = ""; // Reset loader classes
            window.scrollTo(0,0);

            if (hash === 'admin09') buildAdminLogin(root);
            else if (hash === 'admin-dash' && sessionStorage.getItem('adminAuth')) buildAdminDashboard(root);
            else buildClientApp(root, hash);
        };
        window.addEventListener('hashchange', window.router);

        /* ==========================================================================
           5. CLIENT APPLICATION (E-COMMERCE UI)
           ========================================================================== */
        function buildClientApp(root, route) {
            const s = window.DB.settings.main;
            const logoHtml = s.logo ? `<img src="${s.logo}" class="h-12 cursor-pointer" onclick="navigate('home')">` : `<h1 class="text-4xl font-black text-primary tracking-widest cursor-pointer" onclick="navigate('home')">ROUJÎNA</h1>`;
            
            // Generate Main Content
            let content = '';
            if (route === 'home') content = generateHome();
            else if (route === 'sewing') content = generateSewing();
            else if (route.startsWith('product/')) content = generateProduct(route.split('/')[1]);
            else content = `<div class="text-center p-20 text-3xl font-black text-red-500">صفحة غير موجودة</div>`;

            root.innerHTML = `
                <!-- Header -->
                <header class="bg-white shadow-md sticky top-0 z-40">
                    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                        <button class="text-3xl text-primary" onclick="document.getElementById('mobile-menu').classList.remove('hidden-all')"><i class="fas fa-bars"></i></button>
                        ${logoHtml}
                        <div class="flex gap-5 items-center">
                            <button class="text-2xl text-gray-700" onclick="window.DB.lang=window.DB.lang==='ar'?'fr':'ar'; applyGlobalSettings(); window.router();"><i class="fas fa-language"></i></button>
                            <button class="text-2xl text-gray-700 relative"><i class="fas fa-shopping-cart"></i></button>
                        </div>
                    </div>
                    <!-- Search Bar -->
                    <div class="bg-primary p-3 shadow-inner">
                        <div class="container mx-auto relative flex items-center">
                            <i class="fas fa-search absolute ${window.DB.lang==='ar'?'right-6':'left-6'} text-gray-400 z-10 text-xl"></i>
                            <input type="text" placeholder="${window.t('search')}" class="w-full p-3 rounded-full px-14 outline-none font-bold shadow-inner" onkeyup="window.searchProds(this.value)">
                        </div>
                    </div>
                </header>

                <!-- Sidebar Menu -->
                <div id="mobile-menu" class="fixed inset-0 bg-black bg-opacity-70 z-50 hidden-all backdrop-blur-sm" onclick="this.classList.add('hidden-all')">
                    <div class="bg-white w-80 h-full p-8 flex flex-col slide-up" onclick="event.stopPropagation()">
                        <div class="flex justify-between items-center border-b pb-6 mb-6">
                            ${logoHtml}
                            <button class="text-3xl text-red-500" onclick="document.getElementById('mobile-menu').classList.add('hidden-all')"><i class="fas fa-times"></i></button>
                        </div>
                        <ul class="space-y-6 text-xl font-bold text-gray-700 flex-1">
                            <li><button onclick="navigate('home'); document.getElementById('mobile-menu').classList.add('hidden-all')" class="flex items-center gap-4 hover:text-primary"><i class="fas fa-home w-8 text-center text-primary"></i> ${window.t('home')}</button></li>
                            <li><button onclick="navigate('sewing'); document.getElementById('mobile-menu').classList.add('hidden-all')" class="flex items-center gap-4 hover:text-primary"><i class="fas fa-cut w-8 text-center text-primary"></i> ${window.t('sew')}</button></li>
                            <hr class="border-gray-300">
                            <li><button onclick="showModal('${window.t('about')}', '${window.l(s, 'about')}'); document.getElementById('mobile-menu').classList.add('hidden-all')" class="flex items-center gap-4 hover:text-primary"><i class="fas fa-info-circle w-8 text-center text-primary"></i> ${window.t('about')}</button></li>
                            <li><button onclick="showModal('${window.t('priv')}', '${window.l(s, 'pol_priv')}'); document.getElementById('mobile-menu').classList.add('hidden-all')" class="flex items-center gap-4 hover:text-primary"><i class="fas fa-shield-alt w-8 text-center text-primary"></i> ${window.t('priv')}</button></li>
                            <li><button onclick="showModal('${window.t('ship')}', '${window.l(s, 'pol_ship')}'); document.getElementById('mobile-menu').classList.add('hidden-all')" class="flex items-center gap-4 hover:text-primary"><i class="fas fa-truck w-8 text-center text-primary"></i> ${window.t('ship')}</button></li>
                        </ul>
                    </div>
                </div>

                <!-- Page Content -->
                <main class="min-h-screen pb-10">${content}</main>

                <!-- FIXED & ORGANIZED FOOTER (AS REQUESTED) -->
                <footer class="bg-gray-100 pt-16">
                    <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-12 border-b border-gray-300 pb-12 text-center md:text-start">
                        <!-- Left: Info & Links -->
                        <div class="flex flex-col items-center md:items-start">
                            ${logoHtml}
                            <p class="text-gray-600 mt-6 font-bold text-lg max-w-md leading-relaxed">${window.l(s, 'about').substring(0, 150)}...</p>
                            
                            <!-- Policy Links directly above social bar -->
                            <div class="flex flex-wrap justify-center md:justify-start gap-6 mt-8 text-lg font-black text-gray-800">
                                <button onclick="showModal('${window.t('priv')}', '${window.l(s, 'pol_priv')}')" class="hover:text-primary transition">${window.t('priv')}</button>
                                <button onclick="showModal('${window.t('ship')}', '${window.l(s, 'pol_ship')}')" class="hover:text-primary transition">${window.t('ship')}</button>
                                <button onclick="showModal('${window.t('about')}', '${window.l(s, 'about')}')" class="hover:text-primary transition">${window.t('about')}</button>
                            </div>
                        </div>
                        
                        <!-- Right: Map -->
                        <div class="w-full">
                            <h3 class="text-2xl font-black mb-6 text-gray-800 flex items-center gap-3 justify-center md:justify-start"><i class="fas fa-map-marker-alt text-primary"></i> مقرنا الرسمي</h3>
                            <iframe src="${s.mapUrl}" width="100%" height="250" class="border-4 border-white rounded-3xl shadow-xl" allowfullscreen="" loading="lazy"></iframe>
                        </div>
                    </div>
                    
                    <!-- ABSOLUTE BOTTOM SOCIAL BAR (NOT FLOATING) -->
                    <div class="bg-gray-900 py-6 mt-auto">
                        <div class="container mx-auto px-4 flex flex-col md:flex-row justify-between items-center text-white gap-4">
                            <p class="text-lg font-bold tracking-widest text-gray-400">© 2024 ROUJÎNA. All Rights Reserved.</p>
                            <div class="flex gap-6 text-3xl">
                                ${s.fb ? `<a href="${s.fb}" target="_blank" class="text-gray-400 hover:text-blue-500 transition transform hover:scale-125"><i class="fab fa-facebook"></i></a>` : ''}
                                ${s.ig ? `<a href="${s.ig}" target="_blank" class="text-gray-400 hover:text-pink-500 transition transform hover:scale-125"><i class="fab fa-instagram"></i></a>` : ''}
                                ${s.tt ? `<a href="${s.tt}" target="_blank" class="text-gray-400 hover:text-white transition transform hover:scale-125"><i class="fab fa-tiktok"></i></a>` : ''}
                                ${s.wa ? `<a href="https://wa.me/${s.wa}" target="_blank" class="text-gray-400 hover:text-green-500 transition transform hover:scale-125"><i class="fab fa-whatsapp"></i></a>` : ''}
                            </div>
                        </div>
                    </div>
                </footer>

                <!-- ONLY Sewing Floating Button Left -->
                <div class="fab-sewing" onclick="navigate('sewing')" title="${window.t('sew')}"><i class="fas fa-cut"></i></div>
            `;
        }

        function generateHome() {
            let catHTML = window.DB.categories.map(c => `
                <div class="flex flex-col items-center min-w-[100px] cursor-pointer hover:scale-110 transition duration-300" onclick="window.renderProds('${c.id}')">
                    <img src="${c.img}" class="w-24 h-24 rounded-full object-cover border-4 border-primary shadow-lg p-1 bg-white">
                    <span class="text-base font-black mt-3 text-center text-gray-800">${window.l(c, 'name')}</span>
                </div>
            `).join('');

            return `
                <!-- Dynamic Banner Placeholder -->
                <div class="w-full h-64 md:h-96 relative flex items-center justify-center bg-gray-900 shadow-xl">
                    <img src="https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=1200&fit=crop" class="absolute inset-0 w-full h-full object-cover opacity-50">
                    <div class="relative z-10 text-center text-white p-4">
                        <h2 class="text-5xl md:text-7xl font-black mb-4 slide-up drop-shadow-2xl">ROUJÎNA</h2>
                        <p class="text-2xl font-bold slide-up drop-shadow-lg" style="animation-delay: 0.2s">اكتشفي التشكيلة الجديدة</p>
                    </div>
                </div>

                <!-- Categories -->
                <div class="container mx-auto py-10 px-4">
                    <div class="flex gap-8 overflow-x-auto hide-scroll pb-6 pt-4">${catHTML}</div>
                </div>

                <!-- Products Grid -->
                <div class="container mx-auto px-4">
                    <div class="flex justify-between items-center mb-8 border-b-4 border-primary pb-3">
                        <h3 class="text-3xl font-black text-gray-800">المنتجات</h3>
                        <button onclick="window.renderProds()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold px-4 py-2 rounded-xl transition">عرض الكل</button>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="products-grid"></div>
                </div>
                <script>setTimeout(()=>window.renderProds(), 50);<\/script>
            `;
        }

        window.renderProds = (cId = null) => {
            const grid = document.getElementById('products-grid');
            if(!grid) return;
            let arr = cId ? window.DB.products.filter(p => p.category === cId) : window.DB.products;
            if(arr.length === 0) { grid.innerHTML = `<div class="col-span-full text-center text-2xl font-bold text-gray-500 py-10">لا توجد منتجات حالياً.</div>`; return; }
            
            grid.innerHTML = arr.map(p => `
                <div class="bg-white rounded-3xl shadow-md hover:shadow-2xl transition duration-300 overflow-hidden cursor-pointer relative border border-gray-100 flex flex-col group" onclick="navigate('product/${p.id}')">
                    ${p.oldPrice > p.price ? `<span class="absolute top-4 ${window.DB.lang==='ar'?'right-4':'left-4'} bg-red-500 text-white text-sm font-black px-3 py-1 rounded-full z-10 shadow-lg" dir="ltr">-${Math.round((p.oldPrice-p.price)/p.oldPrice*100)}%</span>` : ''}
                    <div class="overflow-hidden relative h-64 md:h-80 w-full">
                        <img src="${p.imgs[0]}" class="w-full h-full object-cover transform group-hover:scale-110 transition duration-500">
                    </div>
                    <div class="p-5 flex flex-col flex-1 justify-between bg-white z-20">
                        <h4 class="font-bold text-gray-900 text-xl line-clamp-2 leading-snug">${window.l(p, 'name')}</h4>
                        <div class="mt-4 flex justify-between items-end">
                            <div>
                                <span class="text-primary font-black text-2xl">${p.price} دج</span>
                                ${p.oldPrice > p.price ? `<br><del class="text-gray-400 font-bold text-lg">${p.oldPrice} دج</del>` : ''}
                            </div>
                            <button class="bg-gray-100 text-primary w-12 h-12 rounded-full font-bold text-xl group-hover:bg-primary group-hover:text-white transition shadow-sm"><i class="fas fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        };

        window.calcRealTotal = (basePrice) => {
            let qty = parseInt(document.getElementById('o_qty').value) || 1;
            let wilaya = document.getElementById('o_wl').value;
            let type = document.getElementById('o_tp').value; // 'home' or 'desk'
            
            let shippingCost = 0;
            if (wilaya && window.DB.shipping[wilaya]) {
                shippingCost = parseInt(window.DB.shipping[wilaya][type]) || 0;
            }
            
            let finalTotal = (basePrice * qty) + shippingCost;
            document.getElementById('o_tot_disp').innerText = finalTotal + ' دج';
        };

        window.submitOrder = async (e, pId, basePrice) => {
            e.preventDefault();
            let qty = parseInt(document.getElementById('o_qty').value);
            let wilaya = document.getElementById('o_wl').value;
            let type = document.getElementById('o_tp').value;
            let sz = document.querySelector('input[name="p_size"]:checked')?.value || '-';
            let cl = document.querySelector('input[name="p_color"]:checked')?.value || '-';
            
            let shippingCost = window.DB.shipping[wilaya] ? parseInt(window.DB.shipping[wilaya][type] || 0) : 0;
            let finalTotal = (basePrice * qty) + shippingCost;

            let orderId = 'ORD-' + Date.now();
            let orderData = {
                date: new Date().toLocaleString(), pId: pId, size: sz, color: cl, qty: qty,
                customer: document.getElementById('o_nm').value, phone: document.getElementById('o_ph').value,
                wilaya: wilaya, address: document.getElementById('o_ad').value, deliveryType: type,
                total: finalTotal, status: 'pending'
            };

            // Save to Firebase
            await window.FB.save('orders', orderId, orderData);
            window.DB.orders.push({id: orderId, ...orderData});
            
            // Decrease Stock in Firebase
            let product = window.DB.products.find(x => x.id === pId);
            if(product) {
                product.stock = Math.max(0, product.stock - qty);
                await window.FB.update('products', pId, { stock: product.stock });
            }

            window.showToast('تم تأكيد طلبك بنجاح! سنتصل بك قريباً.');
            setTimeout(() => navigate('home'), 2000);
        };

                let text = e.target.result;
                let lines = text.split('\n');
                let newShipping = {};
                
                for(let line of lines) {
                    let parts = line.split(',');
                    if(parts.length >= 3) {
                        let wilaya = parts[0].trim();
                        let homePrice = parseInt(parts[1].trim());
                        let deskPrice = parseInt(parts[2].trim());
                        newShipping[wilaya] = { home: homePrice, desk: deskPrice };
                        // Save individually to Firebase Collection 'shipping'
                        await window.FB.save('shipping', wilaya, newShipping[wilaya]);
                    }
                }
                window.DB.shipping = newShipping;
                window.showToast('تم مزامنة أسعار الشحن مع Firebase بنجاح!');
            };
            reader.readAsText(file);
        };

        // START SYSTEM
        fetchSystemData();
    </script>
</body>
</html>
