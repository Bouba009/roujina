<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="purple">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROUJÎNA | روجينا</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: 'var(--primary)', secondary: 'var(--secondary)' } } }
        }
    </script>

    <style>
        /* CSS Variables for Themes */
        :root { --primary: #8b5cf6; --secondary: #6d28d9; --bg: #f9fafb; }
        [data-theme="red"] { --primary: #9f1239; --secondary: #881337; }
        [data-theme="orange"] { --primary: #ea580c; --secondary: #c2410c; }
        [data-theme="gold"] { --primary: #d97706; --secondary: #b45309; }
        
        /* Core Styles */
        body { font-family: 'Tajawal', sans-serif; background-color: var(--bg); overflow-x: hidden; }
        [lang="fr"] body { font-family: 'Poppins', sans-serif; }
        
        .hidden-all { display: none !important; }
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Sliders & Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        /* Floating Buttons */
        .fab { position: fixed; bottom: 20px; z-index: 50; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; transition: 0.3s; }
        .fab:hover { transform: scale(1.1); }
        .fab-whatsapp { right: 20px; background-color: #25D366; color: white; font-size: 30px; }
        .fab-sewing { right: 90px; background-color: var(--primary); color: white; font-size: 25px; }
        [dir="ltr"] .fab-whatsapp { left: 20px; right: auto; }
        [dir="ltr"] .fab-sewing { left: 90px; right: auto; }

        /* Toast & Modals */
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #10B981; color: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 9999; font-weight: bold; transition: top 0.5s; display: flex; gap: 10px; align-items: center;}
        .toast-show { top: 20px !important; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; justify-content: center; align-items: center; }

        /* Printing */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body class="text-gray-800">

    <!-- Global Toast -->
    <div id="toast"><i class="fas fa-check-circle text-2xl"></i> <span id="toast-msg"></span></div>
    
    <!-- Modals Container -->
    <div id="modal-container"></div>

    <!-- Main App Root -->
    <div id="app-root"></div>

    <!-- Print Area -->
    <div id="print-area" class="hidden-all bg-white p-8"></div>

    <!-- Application Script -->
    <script>
        /* ==========================================================================
           1. DATABASE & STATE (LocalStorage + Real Structures)
           ========================================================================== */
        const DEFAULT_DATA = {
            lang: 'ar',
            settings: {
                theme: 'purple',
                logo: '',
                whatsapp: '213540021900',
                mapUrl: 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d102434.61338662661!2d2.8091176211604165!3d36.48202573686866!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x128fa6b00676b0cb%3A0xe5a3bb4de278ce51!2sBlida!5e0!3m2!1sen!2sdz!4v1700000000000!5m2!1sen!2sdz',
                pixel: '',
                ads_header: '',
                ads_popup: false,
                social_fb: 'https://facebook.com',
                social_ig: 'https://instagram.com',
                social_tt: 'https://tiktok.com',
                pol_priv_ar: 'سياسة الخصوصية الخاصة بروجينا...', pol_priv_fr: 'Politique de confidentialité...',
                pol_ship_ar: 'يتم الشحن خلال 3 أيام...', pol_ship_fr: 'Livraison en 3 jours...',
                about_ar: 'روجينا وجهتك الأولى للأناقة والتفصيل...', about_fr: 'Roujîna, votre destination élégance...',
            },
            shippingRates: { "09": 400, "16": 500, "31": 800 },
            banners: [
                { img: 'https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=1200&fit=crop', link: '#products' }
            ],
            categories: [
                { id: 'c1', ar: 'نسائية', fr: 'Femmes', img: 'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=200&fit=crop' },
                { id: 'c2', ar: 'أطفال', fr: 'Enfants', img: 'https://images.unsplash.com/photo-1519241047957-be31d7379a5d?w=200&fit=crop' },
                { id: 'c3', ar: 'أفرشة', fr: 'Literie', img: 'https://images.unsplash.com/photo-1522771731478-44eb10e5c845?w=200&fit=crop' }, // Fixed Image
                { id: 'c4', ar: 'خياطة', fr: 'Couture', img: 'https://images.unsplash.com/photo-1556228578-0d85b1a4d571?w=200&fit=crop' },
                { id: 'c5', ar: 'إكسسوارات', fr: 'Accessoires', img: 'https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=200&fit=crop' }
            ],
            products: [
                { id: 'p1', name_ar: 'فستان ملكي', name_fr: 'Robe Royale', desc_ar: 'فستان سهرة', desc_fr: 'Robe soirée', price: 8500, oldPrice: 10000, category: 'c1', imgs: ['https://images.unsplash.com/photo-1572804013309-59a88b7e92f1?w=600'], sizes: ['S','M'], colors: ['أحمر'], stock: 10, feat: true, reviews: [] }
            ],
            orders: [],
            sewingOrders: [],
            finances: []
        };

        let DB = JSON.parse(localStorage.getItem('ROUJINA_V2'));
        if (!DB) { DB = DEFAULT_DATA; saveData(); }

        function saveData() { localStorage.setItem('ROUJINA_V2', JSON.stringify(DB)); }

        // Security
        const _U = "YWRtaW4="; const _P = "I2FtaXJhMjAyNiM=";

        /* ==========================================================================
           2. UTILITIES & COMPRESSION
           ========================================================================== */
        const T = {
            ar: { search: 'ابحث عن منتج...', cart: 'عربة التسوق', confirm: 'تأكيد الطلب', home: 'الرئيسية', about: 'من نحن', priv: 'سياسة الخصوصية', ship: 'سياسة الشحن', contact: 'اتصل بنا', report: 'الإبلاغ عن مشكل', total: 'المجموع الإجمالي', size: 'المقاس', color: 'اللون', sew_req: 'طلب خياطة' },
            fr: { search: 'Rechercher...', cart: 'Panier', confirm: 'Confirmer la commande', home: 'Accueil', about: 'À propos', priv: 'Confidentialité', ship: 'Livraison', contact: 'Contactez-nous', report: 'Signaler un problème', total: 'Total Général', size: 'Taille', color: 'Couleur', sew_req: 'Demande Couture' }
        };
        const trans = (key) => T[DB.lang][key] || key;
        const getL = (obj, key) => DB.lang === 'ar' ? obj[`${key}_ar`] || obj['ar'] : obj[`${key}_fr`] || obj['fr'];

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.add('toast-show');
            setTimeout(() => t.classList.remove('toast-show'), 3500);
        }

        function showModal(title, content) {
            document.getElementById('modal-container').innerHTML = `
                <div class="modal-overlay fade-in" onclick="this.remove()">
                    <div class="bg-white p-8 rounded-3xl w-11/12 md:w-1/2 max-h-[80vh] overflow-y-auto relative slide-up" onclick="event.stopPropagation()">
                        <button class="absolute top-4 ${DB.lang==='ar'?'left-4':'right-4'} text-red-500 text-2xl font-bold" onclick="document.querySelector('.modal-overlay').remove()">&times;</button>
                        <h2 class="text-3xl font-bold text-primary mb-6">${title}</h2>
                        <div class="text-gray-700 leading-relaxed font-bold">${content}</div>
                    </div>
                </div>`;
        }

        function compressImage(file, maxW, callback) {
            if (!file) return;
            const r = new FileReader();
            r.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > maxW) { h *= maxW / w; w = maxW; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
                img.src = e.target.result;
            };
            r.readAsDataURL(file);
        }

        /* ==========================================================================
           3. ROUTING & CORE RENDER
           ========================================================================== */
        function navigate(hash) { window.location.hash = hash; }
        window.addEventListener('hashchange', router);
        window.addEventListener('DOMContentLoaded', () => { applySettings(); router(); });

        function applySettings() {
            document.documentElement.setAttribute('data-theme', DB.settings.theme);
            document.documentElement.lang = DB.lang;
            document.documentElement.dir = DB.lang === 'ar' ? 'rtl' : 'ltr';
            if(DB.settings.theme.startsWith('#')) {
                document.documentElement.style.setProperty('--primary', DB.settings.theme);
                document.documentElement.style.setProperty('--secondary', DB.settings.theme);
            }
            // Meta Pixel injection
            if(DB.settings.pixel && !window.pixelInjected) {
                // Mock pixel injection logic
                console.log("Pixel Activated: " + DB.settings.pixel);
                window.pixelInjected = true;
            }
        }

        function router() {
            const hash = window.location.hash.replace('#', '') || 'home';
            const root = document.getElementById('app-root');
            root.innerHTML = ''; window.scrollTo(0,0);

            if (hash === 'admin09') renderAdminLogin(root);
            else if (hash === 'admin-dash' && sessionStorage.getItem('adminAuth')) renderAdminDashboard(root);
            else renderClientApp(root, hash);
        }

        /* ==========================================================================
           4. CLIENT INTERFACE (E-Commerce)
           ========================================================================== */
        function renderClientApp(root, route) {
            // Header HTML
            const headerAd = DB.settings.ads_header ? `<div class="bg-yellow-400 text-center p-2 font-bold">${DB.settings.ads_header}</div>` : '';
            const logoHTML = DB.settings.logo ? `<img src="${DB.settings.logo}" class="h-10">` : `<h1 class="text-3xl font-black text-primary tracking-widest cursor-pointer" onclick="navigate('home')">ROUJÎNA</h1>`;
            
            let mainContent = '';
            if (route === 'home') mainContent = buildHomeHTML();
            else if (route === 'sewing') mainContent = buildSewingHTML();
            else if (route.startsWith('product/')) mainContent = buildProductHTML(route.split('/')[1]);

            root.innerHTML = `
                ${headerAd}
                <!-- Header -->
                <header class="bg-white shadow-md sticky top-0 z-40">
                    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
                        <button class="text-2xl text-primary" onclick="document.getElementById('sidebar').classList.remove('hidden-all')"><i class="fas fa-bars"></i></button>
                        ${logoHTML}
                        <div class="flex gap-4 items-center">
                            <button class="text-xl" onclick="toggleLang()"><i class="fas fa-language"></i></button>
                            <button class="text-xl relative"><i class="fas fa-shopping-cart text-gray-700"></i></button>
                        </div>
                    </div>
                    <!-- Search -->
                    <div class="bg-primary p-2">
                        <div class="container mx-auto relative flex items-center">
                            <i class="fas fa-search absolute ${DB.lang==='ar'?'right-6':'left-6'} text-gray-400 z-10"></i>
                            <input type="text" placeholder="${trans('search')}" class="w-full p-2 rounded-full px-12 outline-none font-bold" onkeyup="filterHome(this.value)">
                        </div>
                    </div>
                </header>

                <!-- Sidebar -->
                <div id="sidebar" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden-all" onclick="this.classList.add('hidden-all')">
                    <div class="bg-white w-72 h-full p-6 slide-up overflow-y-auto flex flex-col" onclick="event.stopPropagation()">
                        <div class="flex justify-between border-b pb-4 mb-4">
                            ${logoHTML}
                            <button class="text-2xl text-red-500" onclick="document.getElementById('sidebar').classList.add('hidden-all')"><i class="fas fa-times"></i></button>
                        </div>
                        <ul class="space-y-4 text-lg font-bold text-gray-700 flex-1">
                            <li><a href="#home" onclick="document.getElementById('sidebar').classList.add('hidden-all')" class="hover:text-primary block flex items-center gap-3"><i class="fas fa-home w-6"></i> ${trans('home')}</a></li>
                            <li><a href="#sewing" onclick="document.getElementById('sidebar').classList.add('hidden-all')" class="hover:text-primary block flex items-center gap-3"><i class="fas fa-cut w-6"></i> ${trans('sew_req')}</a></li>
                            <hr>
                            <li><button onclick="showModal('${trans('about')}', '${getL(DB.settings, 'about')}')" class="hover:text-primary w-full text-start flex items-center gap-3"><i class="fas fa-info-circle w-6"></i> ${trans('about')}</button></li>
                            <li><button onclick="showModal('${trans('priv')}', '${getL(DB.settings, 'pol_priv')}')" class="hover:text-primary w-full text-start flex items-center gap-3"><i class="fas fa-shield-alt w-6"></i> ${trans('priv')}</button></li>
                            <li><button onclick="showModal('${trans('ship')}', '${getL(DB.settings, 'pol_ship')}')" class="hover:text-primary w-full text-start flex items-center gap-3"><i class="fas fa-truck w-6"></i> ${trans('ship')}</button></li>
                        </ul>
                    </div>
                </div>

                <!-- Main Section -->
                <main class="min-h-screen pb-10" id="client-main-content">${mainContent}</main>

                <!-- Restructured Footer (Per User Request) -->
                <footer class="bg-gray-900 text-white pt-12 pb-24 md:pb-6">
                    <div class="container mx-auto px-4 grid grid-cols-1 md:grid-cols-2 gap-10">
                        <!-- Left/Right depending on lang: Info & Socials -->
                        <div class="flex flex-col items-center md:items-start text-center md:text-start">
                            ${logoHTML.replace('text-primary','text-white')}
                            <p class="text-gray-400 mt-4 font-bold max-w-sm">${getL(DB.settings, 'about').substring(0, 100)}...</p>
                            
                            <!-- Social Media Icons specifically positioned here -->
                            <div class="flex gap-6 mt-6 mb-8">
                                ${DB.settings.social_ig ? `<a href="${DB.settings.social_ig}" target="_blank" class="w-12 h-12 rounded-full bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 flex items-center justify-center text-2xl hover:scale-110 transition shadow-lg"><i class="fab fa-instagram"></i></a>` : ''}
                                ${DB.settings.social_fb ? `<a href="${DB.settings.social_fb}" target="_blank" class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center text-2xl hover:scale-110 transition shadow-lg"><i class="fab fa-facebook-f"></i></a>` : ''}
                                ${DB.settings.social_tt ? `<a href="${DB.settings.social_tt}" target="_blank" class="w-12 h-12 rounded-full bg-black border border-gray-600 flex items-center justify-center text-2xl hover:scale-110 transition shadow-lg"><i class="fab fa-tiktok"></i></a>` : ''}
                            </div>
                            
                            <!-- Policy Links directly below Socials -->
                            <div class="flex flex-wrap justify-center md:justify-start gap-4 text-sm font-bold text-gray-300">
                                <button onclick="showModal('${trans('priv')}', '${getL(DB.settings, 'pol_priv')}')" class="hover:text-primary">${trans('priv')}</button> |
                                <button onclick="showModal('${trans('ship')}', '${getL(DB.settings, 'pol_ship')}')" class="hover:text-primary">${trans('ship')}</button> |
                                <button onclick="showModal('${trans('about')}', '${getL(DB.settings, 'about')}')" class="hover:text-primary">${trans('about')}</button> |
                                <a href="mailto:admin@roujina.com" class="hover:text-primary">${trans('report')}</a>
                            </div>
                        </div>

                        <!-- Map Section -->
                        <div class="w-full">
                            <h3 class="text-xl font-bold mb-4 border-b border-gray-700 pb-2 flex items-center gap-2"><i class="fas fa-map-marker-alt text-primary"></i> مقرنا</h3>
                            <iframe src="${DB.settings.mapUrl}" width="100%" height="200" class="border-0 rounded-2xl shadow-xl" allowfullscreen="" loading="lazy"></iframe>
                        </div>
                    </div>
                </footer>

                <!-- Floating Actions -->
                <a href="https://wa.me/${DB.settings.whatsapp}" target="_blank" class="fab fab-whatsapp"><i class="fab fa-whatsapp"></i></a>
                <div class="fab fab-sewing" onclick="navigate('sewing')" title="${trans('sew_req')}"><i class="fas fa-cut"></i></div>
            `;

            if(DB.settings.ads_popup && route === 'home') {
                setTimeout(() => showModal('عرض خاص!', '<div class="text-center"><p class="text-xl text-red-500 mb-4">تخفيضات تصل لـ 50% على جميع الأفرشة</p><button onclick="document.querySelector(\'.modal-overlay\').remove()" class="bg-primary text-white px-6 py-2 rounded-full">تسوق الآن</button></div>'), 2000);
            }
        }

        function toggleLang() { DB.lang = DB.lang === 'ar' ? 'fr' : 'ar'; saveData(); applySettings(); router(); }

        function buildHomeHTML() {
            // Banners
            let bannerHTML = DB.banners.length ? `
                <div class="w-full h-48 md:h-96 relative flex items-center justify-center bg-gray-900 overflow-hidden cursor-pointer" onclick="navigate('${DB.banners[0].link}')">
                    <img src="${DB.banners[0].img}" class="absolute inset-0 w-full h-full object-cover opacity-60">
                    <div class="relative z-10 text-center text-white"><h2 class="text-4xl md:text-6xl font-black slide-up">عروض روجينا</h2></div>
                </div>` : '';

            // Categories
            let catHTML = DB.categories.map(c => `
                <div class="flex flex-col items-center min-w-[90px] cursor-pointer hover:scale-110 transition" onclick="filterHomeCat('${c.id}')">
                    <img src="${c.img}" class="w-20 h-20 rounded-full object-cover border-4 border-primary shadow-lg p-1 bg-white">
                    <span class="text-sm font-bold mt-2 text-center whitespace-nowrap text-gray-700">${getL(c, 'name')}</span>
                </div>
            `).join('');

            return `
                ${bannerHTML}
                <div class="container mx-auto py-8 px-4">
                    <div class="flex gap-6 overflow-x-auto hide-scroll pb-4">${catHTML}</div>
                </div>
                <div class="container mx-auto px-4">
                    <div class="flex justify-between items-center mb-6 border-b-4 border-primary pb-2">
                        <h3 class="text-2xl font-bold">المنتجات</h3>
                        <button onclick="renderProductsGrid(DB.products)" class="text-sm bg-gray-200 px-3 py-1 rounded">إلغاء الفلتر</button>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6" id="products-grid"></div>
                </div>
                <script>setTimeout(()=>renderProductsGrid(DB.products), 50);<\/script>
            `;
        }

        function renderProductsGrid(arr) {
            const grid = document.getElementById('products-grid');
            if(!grid) return;
            if(arr.length === 0) { grid.innerHTML = `<p class="col-span-full text-center text-gray-500 font-bold py-10">لا توجد منتجات</p>`; return; }
            grid.innerHTML = arr.map(p => `
                <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition overflow-hidden cursor-pointer fade-in relative border border-gray-100 flex flex-col" onclick="navigate('product/${p.id}')">
                    ${p.oldPrice > p.price ? `<span class="absolute top-2 ${DB.lang==='ar'?'right-2':'left-2'} bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full z-10" dir="ltr">-${Math.round((p.oldPrice-p.price)/p.oldPrice*100)}%</span>` : ''}
                    ${p.feat ? `<span class="absolute top-2 ${DB.lang==='ar'?'left-2':'right-2'} bg-yellow-400 text-xs font-bold px-2 py-1 rounded shadow z-10"><i class="fas fa-star"></i></span>` : ''}
                    <img src="${p.imgs[0]}" class="w-full h-48 md:h-64 object-cover">
                    <div class="p-4 flex flex-col flex-1 justify-between">
                        <h4 class="font-bold text-gray-800 text-lg line-clamp-2 leading-tight">${getL(p, 'name')}</h4>
                        <div class="mt-3 flex justify-between items-end">
                            <div>
                                <span class="text-primary font-black text-xl">${p.price} دج</span>
                                ${p.oldPrice > p.price ? `<br><del class="text-gray-400 text-sm font-bold">${p.oldPrice} دج</del>` : ''}
                            </div>
                            <button class="bg-primary text-white w-10 h-10 rounded-full shadow hover:bg-secondary flex-shrink-0 flex items-center justify-center"><i class="fas fa-shopping-bag"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filterHome(q) { renderProductsGrid(DB.products.filter(p => getL(p, 'name').toLowerCase().includes(q.toLowerCase()))); }
        function filterHomeCat(cId) { renderProductsGrid(DB.products.filter(p => p.category === cId)); }

        function buildProductHTML(id) {
            const p = DB.products.find(x => x.id === id);
            if(!p) return `<div class="text-center p-20 text-2xl text-red-500 font-bold">المنتج غير موجود</div>`;
            const wOps = Object.keys(DB.shippingRates).map(k => `<option value="${k}">${k} - الشحن: ${DB.shippingRates[k]} دج</option>`).join('');
            
            return `
                <div class="container mx-auto px-4 py-8 fade-in">
                    <button onclick="navigate('home')" class="text-primary font-bold mb-4 flex items-center gap-2"><i class="fas fa-arrow-${DB.lang==='ar'?'right':'left'}"></i> ${trans('home')}</button>
                    <div class="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row border border-gray-100">
                        <div class="md:w-1/2 p-4">
                            <img id="main-prod-img" src="${p.imgs[0]}" class="w-full h-96 object-cover rounded-2xl shadow-sm mb-4">
                            <div class="flex gap-2 overflow-x-auto hide-scroll">
                                ${p.imgs.map(i => `<img src="${i}" onclick="document.getElementById('main-prod-img').src=this.src" class="w-20 h-20 object-cover rounded-xl cursor-pointer border-2 hover:border-primary">`).join('')}
                            </div>
                        </div>

        // Logic Actions
        function calcTotal(w, price) {
            const sh = DB.shippingRates[w] || 0;
            document.getElementById('o_tot').innerText = (price + sh) + ' دج';
        }

        function confirmOrder(e, pId, basePrice) {
            e.preventDefault();
            const w = document.getElementById('o_wl').value;
            const order = {
                id: 'ORD' + Date.now(), date: new Date().toLocaleString(), pId,
                sz: document.getElementById('o_sz')?.value || '-',
                cl: document.getElementById('o_cl')?.value || '-',
                name: document.getElementById('o_nm').value, phone: document.getElementById('o_ph').value,
                wilaya: w, address: document.getElementById('o_ad').value, type: document.getElementById('o_dl').value,
                tot: basePrice + (DB.shippingRates[w]||0), status: 'pending'
            };
            DB.orders.push(order);
            let p = DB.products.find(x=>x.id===pId); if(p) p.stock--;
            saveData(); showToast('تم إرسال طلبك بنجاح!'); setTimeout(()=>navigate('home'), 2000);
        }

        function confirmSewing(e) {
            e.preventDefault();
            compressImage(document.getElementById('sw_img').files[0], 500, (b64) => {
                DB.sewingOrders.push({
                    id: 'SEW' + Date.now(), date: new Date().toLocaleString(), img: b64,
                    desc: document.getElementById('sw_desc').value, name: document.getElementById('sw_nm').value,
                    phone: document.getElementById('sw_ph').value, wilaya: document.getElementById('sw_wl').value, status: 'pending'
                });
                saveData(); showToast('تم إرسال طلب التصميم بنجاح! سنتصل بك.'); setTimeout(()=>navigate('home'), 2000);
            });
        }

        function addReview(e, pId) {
            e.preventDefault();
            const txt = document.getElementById('rev_txt').value;
            let p = DB.products.find(x=>x.id===pId);
            p.reviews.push({ name: 'زبون', txt }); saveData();
            document.getElementById('rev_txt').value = '';
            router(); // refresh
        }

                                <!-- Logo & Socials -->
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200 font-bold text-sm space-y-3">
                                    <h3 class="font-bold text-xl mb-2"><i class="fas fa-link text-primary"></i> الروابط واللوغو</h3>
                                    <div><label>رابط اللوغو (URL):</label><input type="text" id="s_logo" value="${DB.settings.logo}" class="w-full p-2 border rounded bg-gray-50"></div>
                                    <div><label>واتساب (رقم):</label><input type="text" id="s_wa" value="${DB.settings.whatsapp}" class="w-full p-2 border rounded bg-gray-50"></div>
                                    <div><label>فيسبوك:</label><input type="text" id="s_fb" value="${DB.settings.social_fb}" class="w-full p-2 border rounded bg-gray-50"></div>
                                    <div><label>انستغرام:</label><input type="text" id="s_ig" value="${DB.settings.social_ig}" class="w-full p-2 border rounded bg-gray-50"></div>
                                    <button onclick="saveSettingsBasic()" class="w-full bg-primary text-white p-2 rounded">حفظ التغييرات</button>
                                </div>
                                <!-- CSV Shipping -->
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                                    <h3 class="font-bold text-xl mb-4"><i class="fas fa-truck text-primary"></i> تحديث أسعار الشحن (CSV)</h3>
                                    <input type="file" accept=".csv" onchange="uploadCSV(event)" class="w-full p-2 border border-dashed border-gray-400 rounded cursor-pointer mb-2">
                                    <p class="text-xs text-gray-500">صيغة الملف: رقم الولاية,السعر (مثال: 16,400)</p>
                                </div>
                                <!-- DB Backup -->
                                <div class="bg-white p-6 rounded-2xl shadow-sm border border-red-200 bg-red-50">
                                    <h3 class="font-bold text-xl mb-4 text-red-600"><i class="fas fa-database"></i> إدارة البيانات</h3>
                                    <button onclick="exportDB()" class="bg-gray-900 text-white px-4 py-2 rounded font-bold shadow mb-2">تحميل نسخة احتياطية (JSON)</button>
                                    <button onclick="if(confirm('متأكد من مسح كل شيء؟')) { localStorage.removeItem('ROUJINA_V2'); location.reload(); }" class="bg-red-500 text-white px-4 py-2 rounded font-bold shadow block">فرمتة النظام كلياً</button>
                                </div>
                            </div>
                        </div>

                        <!-- OTHER SECTIONS (BANNERS, ERP, INVOICE) ... -->
                        <!-- Kept minimal logic structure to fit code, functionality exists in JS -->
                        <div id="t-ban" class="ad-sect hidden-all">
                            <h2 class="text-3xl font-black mb-6 text-gray-800">البانرات والبيكسل</h2>
                            <div class="bg-white p-6 rounded-2xl shadow-sm border font-bold text-sm space-y-4">
                                <div><label>رابط صورة البانر الرئيسي:</label><input type="text" id="s_ban" value="${DB.banners[0]?.img||''}" class="w-full p-2 border rounded bg-gray-50" onchange="DB.banners[0]={img:this.value, link:'#products'}; saveData()"></div>
                                <div><label>إعلان Header (نص):</label><input type="text" id="s_adh" value="${DB.settings.ads_header}" class="w-full p-2 border rounded bg-gray-50"></div>
                                <div><label><input type="checkbox" id="s_adp" ${DB.settings.ads_popup?'checked':''}> تفعيل نافذة منبثقة إعلانية</label></div>
                                <div><label>Meta Pixel Code ID:</label><input type="text" id="s_px" value="${DB.settings.pixel}" class="w-full p-2 border rounded bg-gray-50"></div>
                                <button onclick="saveSettingsAds()" class="bg-primary text-white p-2 rounded px-6">حفظ</button>
                            </div>
                        </div>

                        <!-- ERP -->
                        <div id="t-erp" class="ad-sect hidden-all">
                            <h2 class="text-3xl font-black mb-6 text-gray-800">النفقات والإيرادات</h2>
                            <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex gap-2 items-end">
                                <select id="er_ty" class="p-2 border rounded bg-gray-50 font-bold outline-none"><option value="in">إيراد (+)</option><option value="out">نفقة (-)</option></select>
                                <input type="number" id="er_vl" placeholder="المبلغ" class="p-2 border rounded bg-gray-50 font-bold w-32">
                                <input type="text" id="er_ds" placeholder="الوصف (مواد، عمال، زبون...)" class="p-2 border rounded bg-gray-50 font-bold flex-1">
                                <button onclick="addFinance()" class="bg-emerald-500 text-white px-6 py-2 rounded font-bold shadow">إضافة</button>
                            </div>
                            <table class="w-full text-right text-sm bg-white rounded-2xl shadow-sm overflow-hidden">
                                <thead class="bg-gray-100"><tr><th class="p-3">التاريخ</th><th class="p-3">الوصف</th><th class="p-3">المبلغ</th><th class="p-3">النوع</th></tr></thead>
                                <tbody>
                                    ${DB.finances.slice().reverse().map(f=>`
                                        <tr class="border-b"><td class="p-3 text-gray-500">${f.date}</td><td class="p-3 font-bold">${f.desc}</td><td class="p-3 font-black ${f.type==='in'?'text-emerald-500':'text-red-500'}">${f.val} دج</td><td class="p-3">${f.type==='in'?'<i class="fas fa-arrow-up text-emerald-500"></i>':'<i class="fas fa-arrow-down text-red-500"></i>'}</td></tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>

                        <!-- INVOICE -->
                        <div id="t-inv" class="ad-sect hidden-all" dir="ltr">
                            <div class="bg-white p-10 rounded-2xl shadow-sm" id="inv-build">
                                <div class="text-center mb-8 border-b pb-4"><h1 class="text-4xl font-black">ROUJÎNA</h1><p class="font-bold text-gray-500">BLIDA | +213 540 02 19 00</p></div>
                                <div class="flex justify-between mb-4 font-bold">
                                    <div>Client: <input type="text" class="border-b outline-none"></div>
                                    <div>Date: <input type="date" class="border-b outline-none" value="${new Date().toISOString().split('T')[0]}"></div>
                                </div>
                                <table class="w-full text-left border-collapse mb-4 text-sm">
                                    <thead class="bg-gray-800 text-white"><tr><th class="p-2 border">Description</th><th class="p-2 border w-20">Qte</th><th class="p-2 border w-24">Prix</th><th class="p-2 border w-24">Total</th></tr></thead>
                                    <tbody id="inv-tbl">
                                        <tr><td class="border p-2" contenteditable="true">Produit</td><td class="border p-2" contenteditable="true">1</td><td class="border p-2" contenteditable="true">5000</td><td class="border p-2 bg-gray-100 font-bold">5000</td></tr>
                                    </tbody>
                                </table>
                                <button onclick="document.getElementById('inv-tbl').insertAdjacentHTML('beforeend','<tr><td class=border p-2 contenteditable=true></td><td class=border p-2 contenteditable=true>1</td><td class=border p-2 contenteditable=true>0</td><td class=border p-2 bg-gray-100>0</td></tr>')" class="text-blue-500 font-bold text-sm">+ Ajouter Ligne</button>
                                <button onclick="html2pdf().from(document.getElementById('inv-build')).save('Facture.pdf')" class="w-full bg-gray-900 text-white py-3 rounded-xl font-bold mt-8"><i class="fas fa-download"></i> Télécharger PDF</button>
                            </div>
                        </div>

                    </div>
                </div>
            `;
            setTimeout(initCharts, 200);
        }

        // Admin Logics
        function adTab(t) {
            document.querySelectorAll('.ad-sect').forEach(e=>e.classList.add('hidden-all'));
            document.getElementById('t-'+t).classList.remove('hidden-all');
            if(['dash','ord','sew','prod','erp'].includes(t)) {
                // simple re-render trick for fresh data
                const root = document.getElementById('app-root');
                renderAdminDashboard(root);
                document.querySelectorAll('.ad-sect').forEach(e=>e.classList.add('hidden-all'));
                document.getElementById('t-'+t).classList.remove('hidden-all');
            }
        }

        function updateDB(arr, id, key, val) {
            let item = DB[arr].find(x=>x.id===id);
            if(item) { item[key] = val; saveData(); showToast('تم التحديث!'); }
        }
        function delDB(arr, id) {
            if(confirm('حذف؟')) { DB[arr] = DB[arr].filter(x=>x.id!==id); saveData(); adTab(arr.substring(0,3)); }
        }

        function saveProduct() {
            const f = document.getElementById('ap_im').files[0];
            if(!f) return alert('أرفق صورة');
            compressImage(f, 600, (b64) => {
                DB.products.push({
                    id: 'P'+Date.now(),
                    name_ar: document.getElementById('ap_na').value, name_fr: document.getElementById('ap_nf').value,
                    desc_ar: document.getElementById('ap_da').value, desc_fr: document.getElementById('ap_df').value,
                    price: parseInt(document.getElementById('ap_pr').value), oldPrice: parseInt(document.getElementById('ap_op').value)||0,
                    sizes: document.getElementById('ap_sz').value.split(',').filter(x=>x),
                    colors: document.getElementById('ap_cl').value.split(',').filter(x=>x),
                    stock: parseInt(document.getElementById('ap_st').value)||1,
                    category: document.getElementById('ap_ct').value,
                    imgs: [b64], feat: false, reviews: []
                });
                saveData(); showToast('تم إضافة المنتج'); adTab('prod');
            });
        }

        function addFinance() {
            const v = parseInt(document.getElementById('er_vl').value); if(!v) return;
            DB.finances.push({
                type: document.getElementById('er_ty').value, val: v,
                desc: document.getElementById('er_ds').value, date: new Date().toLocaleDateString()
            }); saveData(); adTab('erp');
        }

        function setTheme(c) { DB.settings.theme = c; saveData(); applySettings(); }
        
        function saveSettingsBasic() {
            DB.settings.logo = document.getElementById('s_logo').value;
            DB.settings.whatsapp = document.getElementById('s_wa').value;
            DB.settings.social_fb = document.getElementById('s_fb').value;
            DB.settings.social_ig = document.getElementById('s_ig').value;
            saveData(); showToast('حفظ');
        }
        function saveSettingsAds() {
            DB.settings.ads_header = document.getElementById('s_adh').value;
            DB.settings.ads_popup = document.getElementById('s_adp').checked;
            DB.settings.pixel = document.getElementById('s_px').value;
            saveData(); showToast('حفظ');
        }

        function uploadCSV(e) {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = ev => {
                let rates = {};
                ev.target.result.split('\n').forEach(l => {
                    let p = l.split(','); if(p.length>1) rates[p[0].trim()] = parseInt(p[1].trim());
                });
                DB.shippingRates = rates; saveData(); showToast('تم تحديث أسعار الشحن');
            }; r.readAsText(f);
        }

        function exportDB() {
            const a = document.createElement('a');
            a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(DB));
            a.download = "roujina_backup.json"; a.click();
        }

        function printLBL(id) {
            const o = DB.orders.find(x=>x.id===id);
            const pr = document.getElementById('print-area');
            pr.innerHTML = `
                <div class="border-4 border-black p-4 w-[10cm] mx-auto text-center" dir="rtl">
                    <h1 class="text-4xl font-black mb-2 border-b-4 border-black pb-2">ROUJÎNA</h1>
                    <h2 class="text-2xl font-bold mb-1">إلى: ${o.name}</h2>
                    <h2 class="text-2xl font-bold mb-2 tracking-widest">${o.phone}</h2>
                    <h2 class="text-3xl font-black mb-2 bg-black text-white p-2 border-2 border-black">ولاية: ${o.wilaya}</h2>
                    <p class="text-lg font-bold mb-4 border-2 border-black p-2 h-20">${o.address}</p>
                    <h3 class="text-2xl font-black">المبلغ للإسترجاع (CRBT):<br>${o.tot} دج</h3>
                    <div id="qr-box" class="flex justify-center mt-4 border-t-4 border-black pt-4"></div>
                </div>`;
            new QRCode(document.getElementById("qr-box"), { text: `Order:${o.id}|Total:${o.tot}`, width: 100, height: 100 });
            setTimeout(() => { window.print(); pr.innerHTML=''; }, 500);
        }

        let c1, c2;
        function initCharts() {
            if(!document.getElementById('ch1')) return;
            if(c1) c1.destroy(); if(c2) c2.destroy();
            c1 = new Chart(document.getElementById('ch1'), {
                type: 'pie', data: { labels: ['قيد المراجعة','مؤكد','ملغي'], datasets: [{ data: [
                    DB.orders.filter(o=>o.status==='pending').length, DB.orders.filter(o=>o.status==='confirmed').length, DB.orders.filter(o=>o.status==='canceled').length
                ], backgroundColor: ['#3b82f6','#10b981','#ef4444'] }] }
            });
            c2 = new Chart(document.getElementById('ch2'), {
                type: 'line', data: { labels: ['إيرادات', 'نفقات'], datasets: [{ label: 'المالية', data: [
                    DB.finances.filter(f=>f.type==='in').reduce((a,b)=>a+b.val,0), DB.finances.filter(f=>f.type==='out').reduce((a,b)=>a+b.val,0)
                ], borderColor: '#8b5cf6', fill: true, backgroundColor: 'rgba(139, 92, 246, 0.2)' }] }
            });
        }
    </script>
</body>
</html>
